<!DOCTYPE html>
<html>
<body>
  <h1>Gallery Debug</h1>
  <div style="display:flex; flex-wrap:wrap; gap:20px;">
    <script>
      // Automatically load gallery 1 to 32
      for (let i = 1; i <= 32; i++) {
        document.write(`
          <div style="border:1px solid #ccc; padding:10px;">
            <img src="/gallery/gallery-${i}.webp" style="height:200px;" onerror="this.parentElement.style.display='none'">
            <p>gallery-${i}.webp</p>
          </div>
        `);
      }
    </script>
  </div>
</body>
</html>
